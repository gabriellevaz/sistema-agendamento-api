<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Sistema de Agendamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">AgendaPro</a>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Sair</button>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Serviços Disponíveis</h2>
        <div id="events-container" class="row">
            <div class="col-12 text-center" id="loading-msg">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Carregando serviços...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="bookingModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Agendar Horário</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p id="modal-service-name" class="fw-bold text-primary mb-3"></p>
            <div id="booking-error" class="alert alert-danger d-none"></div>
            <div id="booking-success" class="alert alert-success d-none"></div>
            
            <form id="booking-form">
              <input type="hidden" id="modal-event-id">
              <div class="mb-4">
                <label for="booking-datetime" class="form-label">Data e Hora:</label>
                <input type="datetime-local" class="form-control" id="booking-datetime" required>
              </div>
              <button type="submit" class="btn btn-success w-100" id="btn-confirm-booking">Confirmar Agendamento</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'https://sistema-agendamento-api-w3o1.onrender.com';
        const token = localStorage.getItem('access_token');
        const bookingModal = new bootstrap.Modal(document.getElementById('bookingModal'));

        // Proteção de rota
        if (!token) window.location.href = "index.html";

        async function carregarEventos() {
            try {
                const response = await fetch(`${API_URL}/events`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) logout();
                if (!response.ok) throw new Error("Erro ao carregar serviços.");

                const events = await response.json();
                const container = document.getElementById('events-container');
                container.innerHTML = '';

                events.forEach(event => {
                    container.innerHTML += `
                        <div class="col-md-4 mb-3">
                            <div class="card h-100 shadow-sm border-0">
                                <div class="card-body">
                                    <h5 class="card-title text-primary">${event.title}</h5>
                                    <p class="card-text text-muted">${event.description || 'Sem descrição'}</p>
                                    <button class="btn btn-success btn-sm w-100" 
                                            onclick="abrirModal('${event.id}', '${event.title}')">Agendar</button>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (err) {
                document.getElementById('loading-msg').innerHTML = `<p class="text-danger">${err.message}</p>`;
            }
        }

        function abrirModal(eventId, title) {
            document.getElementById('modal-event-id').value = eventId;
            document.getElementById('modal-service-name').textContent = `Serviço: ${title}`;
            document.getElementById('booking-error').classList.add('d-none');
            document.getElementById('booking-success').classList.add('d-none');
            bookingModal.show();
        }

        document.getElementById('booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('booking-error');
            const successDiv = document.getElementById('booking-success');
            
            const response = await fetch(`${API_URL}/bookings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    event_id: document.getElementById('modal-event-id').value,
                    scheduled_time: document.getElementById('booking-datetime').value + ":00"
                })
            });

            const data = await response.json();
            if (response.ok) {
                successDiv.innerHTML = `Agendado! Seu QR: <strong>${data.qr_code_token}</strong>`;
                successDiv.classList.remove('d-none');
            } else {
                errorDiv.textContent = data.detail || "Erro no agendamento.";
                errorDiv.classList.remove('d-none');
            }
        });

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        carregarEventos();
    </script>
</body>
</html>
