<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Agendamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            background-color: white;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="text-center mb-4">Bem-vindo(a)</h3>
        
        <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

        <form id="login-form">
            <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" required placeholder="seu@email.com">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" required placeholder="******">
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3">Entrar no Sistema</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            errorDiv.classList.add('d-none');

            const params = new URLSearchParams();
            params.append('username', email);
            params.append('password', password);

            try {
                const response = await fetch('https://sistema-agendamento-api-w3o1.onrender.com/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: params
                });

                if (!response.ok) {
                    throw new Error("E-mail ou senha incorretos.");
                }

                const data = await response.json();
                
                // PADRONIZADO: Salvando com a chave 'access_token'
                localStorage.setItem('access_token', data.access_token);
                
                errorDiv.classList.remove('alert-danger');
                errorDiv.classList.add('alert-success');
                errorDiv.textContent = "Login efetuado com sucesso! Redirecionando...";
                errorDiv.classList.remove('d-none');

                setTimeout(function() {
                    window.location.href = "dashboard.html";
                }, 1000);

            } catch (error) {
                errorDiv.classList.remove('alert-success');
                errorDiv.classList.add('alert-danger');
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
