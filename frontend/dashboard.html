<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Sistema de Agendamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">AgendaPro</a>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Sair (Logout)</button>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Serviços Disponíveis</h2>
        <div id="events-container" class="row">
            <div class="col-12 text-center text-muted" id="loading-msg">
                <p>Carregando dados da API...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="bookingModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Agendar Horário</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p id="modal-service-name" class="fw-bold text-primary mb-3"></p>
            <div id="booking-error" class="alert alert-danger d-none"></div>
            <div id="booking-success" class="alert alert-success d-none"></div>
            
            <form id="booking-form">
              <input type="hidden" id="modal-event-id">
              <input type="hidden" id="modal-company-id">
              <div class="mb-4">
                <label for="booking-datetime" class="form-label">Escolha a Data e Hora:</label>
                <input type="datetime-local" class="form-control" id="booking-datetime" required>
              </div>
              <button type="submit" class="btn btn-success w-100" id="btn-confirm-booking">Confirmar Agendamento</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let bookingModal;
        const container = document.getElementById('events-container');

        function updateStatus(message) {
            container.innerHTML = `<div class="col-12 text-center text-muted mt-4"><p class="fs-5">${message}</p></div>`;
        }

        // 1. Verificação de Segurança
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = "index.html";
        } else {
            iniciarPainel();
        }

        async function iniciarPainel() {
            try {
                updateStatus("Passo 2: Carregando as ferramentas visuais...");
                bookingModal = new bootstrap.Modal(document.getElementById('bookingModal'));

                updateStatus("Passo 3: Conectando com a API...");
                const response = await fetch('https://sistema-agendamento-api-w3o1.onrender.com/events', {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401) {
                    updateStatus("Sessão expirada. Redirecionando...");
                    setTimeout(logout, 2000);
                    return;
                }

                if (!response.ok) throw new Error(`Erro na API: ${response.status}`);

                const events = await response.json();
                
                if (events.length === 0) {
                    container.innerHTML = '<p class="text-muted text-center mt-4">Nenhum serviço disponível.</p>';
                    return;
                }

                updateStatus(""); // Limpa o status
                container.innerHTML = ''; 
                events.forEach(event => {
                    container.innerHTML += `
                        <div class="col-md-4 mb-3">
                            <div class="card h-100 shadow-sm border-0">
                                <div class="card-body">
                                    <h5 class="card-title text-primary">${event.title}</h5>
                                    <p class="card-text text-muted">${event.description}</p>
                                    <button class="btn btn-success btn-sm w-100" onclick="openBookingModal('${event.id}', '${event.company_id}', '${event.title}')">
                                        Agendar Horário
                                    </button>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (error) {
                updateStatus(`<span class="text-danger fw-bold">Falha:</span> ${error.message}`);
            }
        }

        function openBookingModal(eventId, companyId, title) {
            document.getElementById('modal-event-id').value = eventId;
            document.getElementById('modal-company-id').value = companyId;
            document.getElementById('modal-service-name').textContent = `Serviço: ${title}`;
            bookingModal.show();
        }

        document.getElementById('booking-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-confirm-booking');
            const data = await fetch('https://sistema-agendamento-api-w3o1.onrender.com/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    company_id: document.getElementById('modal-company-id').value,
                    event_id: document.getElementById('modal-event-id').value,
                    scheduled_time: document.getElementById('booking-datetime').value + ":00"
                })
            }).then(r => r.json());

            if (data.qr_code_token) {
                document.getElementById('booking-success').innerHTML = `Agendado! QR: <strong>${data.qr_code_token}</strong>`;
                document.getElementById('booking-success').classList.remove('d-none');
            }
        });

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
